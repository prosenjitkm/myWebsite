name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'

      - name: Build backend (skip tests)
        working-directory: backend
        run: |
          chmod +x mvnw || true
          ./mvnw -B -DskipTests package

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install frontend deps
        run: npm install -g npm@11.7.0 && npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build --if-present
        working-directory: frontend

      - name: Build Docker images (local)
        run: |
          docker --version
          docker build -t mywebsite-backend:ci ./backend
          docker build -t mywebsite-frontend:ci ./frontend
