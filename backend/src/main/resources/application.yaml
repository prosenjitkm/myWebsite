server:
  port: 8081
  tomcat:
    max-http-form-post-size: 10MB

spring:
  application:
    name: backend
  profiles:
    active: local
  servlet:
    multipart:
      max-request-size: 10MB
      max-file-size: 10MB
  docker:
    compose:
      enabled: false   # Postgres runs natively — Docker Compose not needed locally
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:mywebsite}
    username: ${DB_USER:admin}
    password: ${DB_PASSWORD:admin}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate        # schema is managed by schema.sql — never auto-modify
    show-sql: false

  # ---- OAuth2 (Google) ----
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:dummy-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:dummy-client-secret}
            scope:
              - email
              - profile

app:
  jwt:
    secret: ${JWT_SECRET:please-set-a-real-256-bit-secret-in-env-file-do-not-use-this}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}   # 24 h

logging:
  level:
    # Silence the intentional Spring Security co-existence warning
    org.springframework.security.config.annotation.authentication.configuration.InitializeUserDetailsBeanManagerConfigurer: ERROR
    # Show DEBUG logs for all our own classes (controllers, services, security)
    com.pro.backend: DEBUG
